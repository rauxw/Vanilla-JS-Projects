<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Quiz Application</title>
  </head>
  <body>
    <div class="main-container">
      <div class="question-select-ans-div">
        <div id="question-title">What is the capital of India?</div>
        <div class="questions-options">
          <div class="questions-option">
            <div class="questions-alphabets">A</div>
            <div class="question-option-choose">Delhi</div>
          </div>
          <div class="questions-option">
            <div class="questions-alphabets">B</div>
            <div class="question-option-choose">Mumbai</div>
          </div>
          <div class="questions-option">
            <div class="questions-alphabets">C</div>
            <div class="question-option-choose">KolKata</div>
          </div>
          <div class="questions-option">
            <div class="questions-alphabets">D</div>
            <div class="question-option-choose">Kabul</div>
          </div>
        </div>
        <button id="submit-button">Submit Answer</button>
      </div>
      <div class="quiz-questions-div">
        <div class="quiz-list-title">Quiz Question List</div>
        <div class="quiz-list">
          <div class="question-back-forth-section">Quiz Question 1</div>
          <div class="question-back-forth-section">Quiz Question 2</div>
          <div class="question-back-forth-section">Quiz Question 3</div>
          <div class="question-back-forth-section">Quiz Question 4</div>
          <div class="question-back-forth-section">Quiz Question 5</div>
          <div class="question-back-forth-section">Quiz Question 6</div>
          <div class="question-back-forth-section">Quiz Question 7</div>
          <div class="question-back-forth-section">Quiz Question 8</div>
          <div class="question-back-forth-section">Quiz Question 9</div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
