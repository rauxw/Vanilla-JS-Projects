<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />

    <title>Password Generator</title>
  </head>
  <body>
    <div class="container">
      <div class="main">
        <div id="main-title">Generate a <span>random password</span></div>
        <div id="sub-title">Never use an insecure password again.</div>
      </div>
      <div class="generate-fun">
        <div class="generate-btn-div">
          <button id="generate-btn" onclick="generatePasswords()">
            Generate passwords
          </button>
          <input
            type="number"
            name="number"
            id="number-el"
            min="1"
            max="25"
            value="1"
          />
        </div>
        <div class="generate-passwords">
          <div
            class="generate-password"
            id="first-password-generate-el"
            onclick="copyToClipBoardFirst()"
          ></div>
          <div
            class="generate-password"
            id="second-password-generate-el"
            onclick="copyToClipBoardSecond()"
          ></div>
        </div>
      </div>
    </div>

    <!-- javascript (start) -->
    <script src="script.js"></script>
    <!-- javascript (end) -->
  </body>
</html>
