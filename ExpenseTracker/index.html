<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Expense Tracker</title>
  </head>
  <body>
    <div class="main">
      <div class="side-bar-section">
        <div class="profile-div">
          <img
            src="images/profile-default.png"
            alt="profile picture of user logged in"
          />
        </div>
        <div class="side-bar-options-div">
          <div class="side-bar-option-style" id="dashboard-el">Dashboard</div>
          <div class="side-bar-option-style" id="transactions-el">
            Transactions
          </div>
          <div class="side-bar-option-style" id="budgets-el">Budgets</div>
          <div class="side-bar-option-style" id="reports-el">Reports</div>
          <div class="side-bar-option-style" id="savings-el">Savings Goals</div>
        </div>
      </div>

      <div id="content">
        <div class="transactions-header">
          <div class="transactions-title">Transactions</div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
  </body>
</html>
